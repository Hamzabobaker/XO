<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3B82F6" />
    <meta
      name="description"
      content="XO - A modern tic-tac-toe game with multiple exciting modes including Classic, Infinite, Blitz, Mega Board. Play against AI or with friends!"
    />
    <meta name="keywords" content="XO, tic-tac-toe, game, puzzle, strategy, AI, multiplayer" />
    <meta name="author" content="Hamza" />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>XO</title>
    
    <style>
      :root {
        --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        --brand-gradient: linear-gradient(135deg, #60A5FA 0%, #A78BFA 100%);
        --muted-text: #94A3B8;
        --muted-text-light: #64748B;
      }

      /* Reset & Box-Sizing */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Keep page scroll enabled; overlay handles splash scroll lock. */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      /* Root container */
      #root {
        width: 100%;
        min-height: 100vh;
        opacity: 0;
        transition: opacity 0.4s ease-out;
      }

      #root.visible {
        opacity: 1;
      }

      /* Fullscreen overlay layers */
      #loading-overlay,
      #mobile-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        z-index: 10000;
        overflow: hidden;
      }

      /* Loading Overlay - uses game background */
      #loading-overlay {
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-out;
      }

      #loading-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loading-content,
      .mobile-content {
        text-align: center;
        animation: fadeInUp 0.6s ease-out;
      }

      .loading-content {
        position: relative;
        z-index: 1;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .loading-title,
      .mobile-title {
        font-family: var(--font-ui);
        font-weight: 900;
        background: var(--brand-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -2px;
      }

      .loading-title {
        font-size: 96px;
        margin-bottom: 40px;
      }

      .loading-spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }

      .loading-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: linear-gradient(135deg, #60A5FA, #A78BFA);
        animation: bounce 1.4s ease-in-out infinite;
      }

      .loading-dot:nth-child(1) { animation-delay: 0s; }
      .loading-dot:nth-child(2) { animation-delay: 0.2s; }
      .loading-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
        40% { transform: scale(1.3); opacity: 1; }
      }

      .loading-text {
        font-size: 16px;
        font-weight: 600;
        color: var(--muted-text);
        font-family: 'Roboto', 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      }

      /* Mobile Interaction Screen */
      #mobile-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease-out;
        padding: 20px;
      }

      #mobile-screen.visible { display: flex; }
      #mobile-screen.fade-out { opacity: 0; pointer-events: none; }

      .mobile-content {
        width: 100%;
        max-width: 400px;
      }

      .mobile-title {
        font-size: 80px;
        margin-bottom: 48px;
      }

      .mobile-tip {
        font-size: 14px;
        font-weight: 500;
        color: var(--muted-text);
        margin-bottom: 32px;
        line-height: 1.6;
        font-family: var(--font-ui);
      }

      .mobile-buttons {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .mobile-btn {
        padding: 18px 32px;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 700;
        font-family: var(--font-ui);
        border: none;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        -webkit-tap-highlight-color: transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #60A5FA 0%, #8B5CF6 100%);
        color: #FFFFFF;
        box-shadow: 0 8px 24px rgba(96, 165, 250, 0.4);
      }

      .btn-secondary {
        background: rgba(148, 163, 184, 0.15);
        color: var(--muted-text);
        border: 2px solid rgba(148, 163, 184, 0.3);
      }

      .btn-secondary.active {
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(139, 92, 246, 0.2));
        color: #60A5FA;
        border-color: #60A5FA;
        box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
      }

      .btn-primary:active,
      .btn-secondary:active { transform: scale(0.97); }

      .fullscreen-icon {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Light mode (if detected) */
      @media (prefers-color-scheme: light) {
        .loading-text, .mobile-tip { color: var(--muted-text-light); }
        .btn-secondary { color: var(--muted-text-light); }
      }

      /* RTL Support */
      [dir="rtl"] .mobile-btn { flex-direction: row-reverse; }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to play XO Game.</noscript>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
      <div class="loading-content">
        <div class="loading-title">XO</div>
        <div class="loading-spinner">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
        <div class="loading-text" id="loading-text">Loading game...</div>
      </div>
    </div>

    <!-- Mobile Interaction Screen -->
    <div id="mobile-screen">
      <div class="mobile-content">
        <div class="mobile-title">XO</div>
        <div class="mobile-tip" id="mobile-tip">
          Fullscreen is recommended for the best experience
        </div>
        <div class="mobile-buttons">
          <button class="mobile-btn btn-secondary" id="fullscreen-btn">
            <svg class="fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
            </svg>
            <span id="fullscreen-text">Fullscreen</span>
          </button>
          <button class="mobile-btn btn-primary" id="start-btn">
            <span id="start-text">Tap to Start</span>
          </button>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      const lang = ((navigator.languages && navigator.languages[0]) || navigator.language || 'en').toLowerCase();
      const isArabic = lang.startsWith('ar');
      const isJapanese = lang.startsWith('ja');
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const docEl = document.documentElement;
      const OVERLAY_FADE_MS = 500;
      const START_FADE_MS = 400;
      const REVEAL_DELAY_MS = 2000;
      const FALLBACK_DELAY_MS = 3000;

      const loadingOverlay = document.getElementById('loading-overlay');
      const loadingText = document.getElementById('loading-text');
      const mobileScreen = document.getElementById('mobile-screen');
      const mobileTip = document.getElementById('mobile-tip');
      const fullscreenBtn = document.getElementById('fullscreen-btn');
      const fullscreenText = document.getElementById('fullscreen-text');
      const startBtn = document.getElementById('start-btn');
      const startText = document.getElementById('start-text');
      const root = document.getElementById('root');

      const translations = {
        en: {
          loading: 'Loading game...',
          tip: 'Fullscreen is recommended for the best experience',
          fullscreen: 'Fullscreen',
          start: 'Tap to Start'
        },
        ar: {
          loading: 'جاري تحميل اللعبة...',
          tip: 'يوصى بوضع ملء الشاشة للحصول على أفضل تجربة',
          fullscreen: 'ملء الشاشة',
          start: 'اضغط للبدء'
        },
        ja: {
          loading: 'ゲームを読み込み中…',
          tip: 'より快適に遊ぶには、フルスクリーンがおすすめです',
          fullscreen: 'フルスクリーン',
          start: 'タップして開始'
        }
      };  

      const t = translations[isArabic ? 'ar' : isJapanese ? 'ja' : 'en'];
      const setText = (el, value) => {
        if (el) el.textContent = value;
      };
      const setFullscreenActive = (active) => {
        isFullscreen = active;
        fullscreenBtn?.classList.toggle('active', active);
      };
      const markGameStarted = () => {
        gameStarted = true;
      };
      const showRoot = () => {
        root?.classList.add('visible');
      };
      const exitOverlay = () => {
        if (!loadingOverlay || loadingOverlay.style.display === 'none') return;
        loadingOverlay.style.display = 'none';
        if (isMobile && !gameStarted) {
          mobileScreen?.classList.add('visible');
          return;
        }
        if (!gameStarted) {
          markGameStarted();
          showRoot();
        }
      };
      const hideMobileAndShowRoot = () => {
        mobileScreen?.classList.add('fade-out');
        window.setTimeout(() => {
          if (mobileScreen) mobileScreen.style.display = 'none';
          showRoot();
        }, START_FADE_MS);
      };
      const requestFullscreen = () =>
        (docEl.requestFullscreen?.() || docEl.webkitRequestFullscreen?.())?.then(() => {
          setFullscreenActive(true);
        }).catch(() => {});
      const leaveFullscreen = () =>
        (document.exitFullscreen?.() || document.webkitExitFullscreen?.())?.then(() => {
          setFullscreenActive(false);
        }).catch(() => {});
      const syncFullscreenState = () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          setFullscreenActive(false);
        }
      };

      if (isArabic) docEl.setAttribute('dir', 'rtl');
      setText(loadingText, t.loading);
      setText(mobileTip, t.tip);
      setText(fullscreenText, t.fullscreen);
      setText(startText, t.start);

      let isFullscreen = false;
      let gameStarted = false;
      let revealStarted = false;

      const revealApp = () => {
        if (revealStarted) return;
        if (!loadingOverlay || loadingOverlay.style.display === 'none') return;
        revealStarted = true;
        loadingOverlay.classList.add('fade-out');
        window.setTimeout(exitOverlay, OVERLAY_FADE_MS);
      };

      fullscreenBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isFullscreen) requestFullscreen();
        else leaveFullscreen();
      });

      document.addEventListener('fullscreenchange', syncFullscreenState);
      document.addEventListener('webkitfullscreenchange', syncFullscreenState);

      startBtn?.addEventListener('click', () => {
        if (gameStarted) return;
        markGameStarted();
        hideMobileAndShowRoot();
      });

      window.addEventListener('load', () => {
        window.setTimeout(revealApp, REVEAL_DELAY_MS);
      }, { once: true });

      window.setTimeout(revealApp, FALLBACK_DELAY_MS); // fallback
    </script>
  </body>
</html>
